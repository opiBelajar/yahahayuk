    <style>
        :root {
            --bg-body: #0f1113;
            --bg-nav: rgba(15, 17, 19, 0.85);
            --text-main: #e0e0e0;
            --accent: #5dade2;
            --card-bg: #1c1f22;
            --nav-height: 90px;
        }

        * {
            margin: 0; padding: 0; box-sizing: border-box;
            font-family: 'Montserrat', sans-serif;
            transition: background-color 0.4s ease, color 0.4s ease;
        }

        body { 
            scroll-behavior: smooth; 
            background-color: var(--bg-body); 
            color: var(--text-main);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            z-index: 9999;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }
        .lightbox.active { display: flex; }
        .lightbox-content {
            max-width: 80%;
            max-height: 70%;
            border-radius: 10px;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            animation: zoom 0.3s ease;
        }
        @keyframes zoom { from {transform: scale(0.7)} to {transform: scale(1)} }
        .close-lightbox {
            position: absolute;
            top: 30px; right: 40px;
            color: white;
            font-size: 40px;
            font-weight: bold;
            cursor: pointer;
        }
        #caption {
            margin-top: 20px;
            color: var(--accent);
            font-weight: 600;
            letter-spacing: 1px;
            text-align: center;
            padding: 0 20px;
        }

        .clickable { cursor: pointer; }

        /* Scroll Reveal */
        .reveal {
            opacity: 0;
            transform: translateY(30px);
            transition: all 0.8s cubic-bezier(0.2, 1, 0.3, 1);
        }
        .reveal.active { opacity: 1; transform: translateY(0); }

        /* Navigation Desktop */
        nav {
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 10%; height: var(--nav-height);
            background: var(--bg-nav);
            position: fixed; width: 100%; top: 0; z-index: 1000;
            backdrop-filter: blur(12px);
            border-bottom: 1px solid rgba(150,150,150,0.1);
        }

        .logo { font-weight: 700; font-size: 1.5rem; letter-spacing: 2px; color: var(--accent); }
        .nav-links { display: flex; list-style: none; align-items: center; }
        .nav-links li { margin-left: 35px; }

        .nav-item {
            text-decoration: none; color: var(--text-main);
            font-weight: 600; font-size: 1.1rem; position: relative;
        }
        .nav-item::after {
            content: ''; position: absolute; width: 0; height: 3px;
            bottom: -8px; left: 0; background-color: var(--accent);
            transition: width 0.3s;
        }
        .nav-item:hover::after { width: 100%; }

        /* Hamburger Styles Default */
        .menu-toggle {
            display: none;
            cursor: pointer;
            flex-direction: column;
            justify-content: space-between;
            width: 30px;
            height: 21px;
        }
        .menu-toggle .bar {
            height: 3px;
            width: 100%;
            background-color: var(--accent);
            border-radius: 10px;
            transition: all 0.3s ease-in-out;
        }

        /* Hero Section */
        section { padding: calc(var(--nav-height) + 60px) 10% 80px 10%; min-height: 100vh; }
        .section-title { text-align: center; margin-bottom: 60px; font-size: 2.5rem; font-weight: 700; }

        #home {
            background: linear-gradient(rgba(0,0,0,0.6), rgba(0,0,0,0.6)), 
                        url('background.jpg') center/cover;
            display: flex; flex-direction: column; justify-content: center;
            align-items: center; text-align: center; color: white;
        }
        #home h1 { font-size: clamp(2.5rem, 8vw, 4.5rem); letter-spacing: 5px; }

        .social-links {
            margin-top: 25px;
            display: flex; gap: 25px; justify-content: center;
        }
        .social-icon {
            font-size: 2.2rem; color: white; text-decoration: none; transition: 0.3s ease;
        }
        .social-icon:hover {
            transform: translateY(-5px) scale(1.1); color: var(--accent);
        }

        /* Student Grid Desktop */
        .student-grid {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 30px;
        }
        .student-card {
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 15px;
            text-align: center; 
            border: 1px solid rgba(150,150,150,0.1);
            transition: 0.3s;
            overflow: hidden;
        }
        .student-card:hover { 
            transform: translateY(-12px); 
            box-shadow: 0 15px 35px rgba(0,0,0,0.4);
            border-color: var(--accent);
        }
        .student-card img {
            width: 100%; height: 220px; 
            border-radius: 10px; object-fit: cover; 
            margin-bottom: 20px; filter: grayscale(100%); transition: 0.4s;
        }
        .student-card:hover img { filter: grayscale(0%); }

        /* Gallery Desktop */
        .gallery-container {
            display: grid; 
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }
        .gallery-item img {
            width: 100%; height: 280px; object-fit: cover; 
            border-radius: 20px; transition: 0.3s;
        }
        .gallery-item img:hover { transform: scale(1.03); filter: brightness(1.1); }

        footer { text-align: center; padding: 60px; opacity: 0.6; font-size: 0.9rem; }

        /* --- MOBILE OPTIMIZATION --- */
        @media (max-width: 768px) {
            :root { --nav-height: 70px; }
            
            nav { padding: 0 5%; }
            .logo { font-size: 0.9rem; letter-spacing: 1px; }

            #home h1 { 
                font-size: 1.0rem; 
            }

            #home p {
                font-size: 0.6rem; 
            }

            .social-icon {
                font-size: 1.0rem; 
            }

            .social-links {
                gap: 10px; 
                margin-top: 15px; 
            }

            .menu-toggle { 
                display: flex; 
                z-index: 1001; 
                width: 20px;   
                height: 15px;  
            }
            .menu-toggle .bar {
                height: 2px;   
            }

            .menu-toggle.is-active .bar:nth-child(2) { opacity: 0; }
            .menu-toggle.is-active .bar:nth-child(1) { transform: translateY(7px) rotate(45deg); }
            .menu-toggle.is-active .bar:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

            .nav-links {
                position: fixed;
                top: 0; right: -100%;
                flex-direction: column;
                background: var(--bg-body);
                width: 70%; height: 100vh;
                padding-top: 100px;
                transition: 0.4s ease;
                box-shadow: -10px 0 30px rgba(0,0,0,0.5);
                backdrop-filter: blur(15px);
            }
            .nav-links.active { right: 0; }
            .nav-links li { margin: 15px 0; width: 100%; text-align: center; }

            .nav-item { 
                font-size: 1rem; 
                letter-spacing: 1px;
                display: block;
                width: 100%;
            }
            
            section { padding: 100px 10px 40px 10px; }
            .section-title { font-size: 1.2rem; margin-bottom: 30px; }

            .student-grid { grid-template-columns: repeat(5, 1fr); gap: 5px; }
            .student-card { padding: 4px; border-radius: 6px; }
            .student-card img { height: 60px; margin-bottom: 4px; filter: grayscale(0%); }
            .student-card h3 {
                font-size: 0.4rem; line-height: 1; font-weight: 600;
                word-break: break-word; display: -webkit-box;
             line-clamp: 2; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
            }
            .student-card p { display: none; }

            .gallery-container { grid-template-columns: repeat(2, 1fr); gap: 10px; }
            .gallery-item img { height: 120px; }

            footer { padding: 30px; font-size: 0.6rem; }
            .close-lightbox { top: 15px; right: 15px; font-size: 25px; }
        }
    </style>

            document.querySelectorAll('.clickable').forEach(image => {

                });
            });

            closeBtn.addEventListener('click', () => {
                lightbox.classList.remove('active');
            });

            lightbox.addEventListener('click', (e) => {
                if(e.target !== lightboxImg) {
                    lightbox.classList.remove('active');
                }
            });

            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        entry.target.classList.add('active');
                    }
                });
            }, { threshold: 0.1 });

            document.querySelectorAll('.reveal').forEach(el => observer.observe(el));
        });

</body>
</html>
